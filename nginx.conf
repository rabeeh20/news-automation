# ─── Prisom — Nginx Configuration ───────────
# Place at: /etc/nginx/sites-available/prisom.live
# Symlink: sudo ln -s /etc/nginx/sites-available/prisom.live /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────

# ─── Rate Limiting ──────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

# ─── HTTP → HTTPS Redirect ─────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name prisom.live www.prisom.live;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prisom.live www.prisom.live;

    # ─── SSL (managed by Certbot — paths updated after cert issuance) ──
    ssl_certificate /etc/letsencrypt/live/prisom.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prisom.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security Headers ──────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Gzip Compression ──────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ─── Client Settings ───────────────────────────
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ─── Static Assets (Next.js build output) ──────
    location /_next/static/ {
        alias /home/ubuntu/news-automation/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Public Static Files ───────────────────────
    location /images/ {
        alias /home/ubuntu/news-automation/public/images/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /favicon.ico {
        alias /home/ubuntu/news-automation/public/favicon.ico;
        expires 365d;
        access_log off;
    }

    location /ads.txt {
        alias /home/ubuntu/news-automation/public/ads.txt;
        expires 1d;
        access_log off;
    }

    location /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1d;
    }

    location /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1h;
    }

    # ─── API Rate Limiting ─────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Reverse Proxy to Next.js ──────────────────
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # ─── Block Sensitive Paths ─────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|bak|sql|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
